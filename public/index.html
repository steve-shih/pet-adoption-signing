<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>寵物認養合約簽署系統</title>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    :root {
      --card-color: rgba(255, 252, 255, 0.96);
      --primary-dark-color: #c46b88;
      --text-color: #5a4450;
      --muted-text-color: #8e7380;
      --border-color: #f2d7e0;
      --shadow-color: rgba(214, 138, 167, 0.16);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 10px;
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 205, 220, 0.42), transparent 28%),
        radial-gradient(circle at top right, rgba(255, 237, 181, 0.34), transparent 24%),
        linear-gradient(180deg, #fffafd 0%, #fff3f8 100%);
      color: var(--text-color);
    }

    .page {
      max-width: 820px;
      margin: 0 auto;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      position: sticky;
      top: 8px;
      z-index: 20;
      flex-wrap: wrap;
    }

    .toolbar button {
      flex: 1 1 140px;
    }

    .contract {
      background: var(--card-color);
      border: 1px solid rgba(242, 215, 224, 0.98);
      border-radius: 16px;
      padding: 10px;
      box-shadow: 0 14px 36px var(--shadow-color);
    }

    .hero {
      text-align: center;
      padding: 4px 2px 10px;
    }

    .hero-badge {
      display: inline-block;
      margin-bottom: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: linear-gradient(135deg, #ffe9f0, #fff5d9);
      color: var(--primary-dark-color);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      color: var(--primary-dark-color);
    }

    .subtitle {
      margin: 4px 0 0;
      font-size: 10px;
      line-height: 1.5;
      color: var(--muted-text-color);
    }

    .section {
      margin-top: 8px;
      padding: 8px;
      border: 1px solid var(--border-color);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.78);
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 0 0 8px;
      font-size: 13px;
      color: var(--primary-dark-color);
    }

    .section-title::before {
      content: "🐾";
      font-size: 14px;
      line-height: 1;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .two-columns {
      grid-template-columns: 1fr 1fr;
    }

    .info-card,
    .signature-shell {
      padding: 6px;
      border-radius: 12px;
      border: 1px solid #f4dfe7;
      background: #fff;
    }

    .label {
      display: block;
      margin-bottom: 3px;
      font-size: 10px;
      font-weight: 700;
      color: #b18495;
    }

    .input,
    button,
    textarea {
      width: 100%;
      font-size: 16px;
      font-family: inherit;
      box-sizing: border-box;
    }

    .input {
      padding: 8px;
      border-radius: 10px;
      border: 1px solid #efd3dd;
      background: #fff;
      color: var(--text-color);
      outline: none;
    }

    .input:focus {
      border-color: #e08aa2;
      box-shadow: 0 0 0 3px rgba(224, 138, 162, 0.16);
    }

    .button {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #f0d7e1;
      font-weight: 800;
      cursor: pointer;
      background: #fff;
      color: var(--primary-dark-color);
    }

    .button-primary {
      background: linear-gradient(135deg, #f39ab4, #f7b77a);
      color: #fff;
      border: none;
    }

    .button-danger {
      background: #f08080;
      color: #fff;
      border: none;
    }

    .signature-title {
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 700;
      color: var(--primary-dark-color);
    }

    canvas {
      width: 100%;
      height: 120px;
      display: block;
      border: 1px dashed #e4b7c7;
      border-radius: 12px;
      background: #fff;
      touch-action: none;
      cursor: crosshair;
    }

    .signature-hint {
      margin-top: 4px;
      font-size: 10px;
      color: #9a7d8c;
      line-height: 1.5;
    }

    .footer-note {
      margin-top: 8px;
      text-align: center;
      font-size: 10px;
      line-height: 1.5;
      color: #a08391;
    }

    .alert {
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      display: none;
      font-size: 12px;
    }

    .alert.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .alert.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    #jsonFileInput {
      display: none;
    }

    @media (max-width: 640px) {
      .two-columns {
        grid-template-columns: 1fr;
      }

      .toolbar {
        flex-direction: column;
      }

      .toolbar button {
        flex: 1 1 auto;
      }
    }

    @page {
      size: A4;
      margin: 10mm;
    }

    @media print {
      body {
        padding: 0;
        background: #fff;
      }

      .toolbar {
        display: none !important;
      }

      .alert {
        display: none !important;
      }

      .contract {
        box-shadow: none;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="toolbar">
      <button class="button button-primary" onclick="saveToServer()">💾 保存</button>
      <button class="button button-danger" onclick="clearAllData()">🗑️ 刪除</button>
      <button class="button button-primary" onclick="downloadContractImage()">📸 下載圖片</button>
      <input id="jsonFileInput" type="file" accept="application/json,.json" />
    </div>

    <div id="alertBox" class="alert"></div>

    <div id="contract" class="contract">
      <div class="hero">
        <div class="hero-badge">ADOPTION AGREEMENT</div>
        <h1>寵物認養合約書</h1>
        <p class="subtitle">所有欄位可修改，自動儲存到本機，支援 JSON 匯入匯出</p>
      </div>

      <!-- 第一章：雙方資訊 -->
      <section class="section">
        <h2 class="section-title">一、送養人與認養人</h2>
        <div class="info-grid two-columns">
          <div class="info-card">
            <span class="label">送養人姓名</span>
            <input class="input persist-field" data-field="giverName" type="text" placeholder="請輸入送養人姓名" />
          </div>
          <div class="info-card">
            <span class="label">送養人身分證</span>
            <input class="input persist-field" data-field="giverId" type="text" placeholder="請輸入送養人身分證" />
          </div>
          <div class="info-card">
            <span class="label">認養人姓名</span>
            <input class="input persist-field" data-field="adopterName" type="text" placeholder="請輸入認養人姓名" />
          </div>
          <div class="info-card">
            <span class="label">認養人身分證</span>
            <input class="input persist-field" data-field="adopterId" type="text" placeholder="請輸入認養人身分證" />
          </div>
        </div>
      </section>

      <!-- 第二章：寵物資訊 -->
      <section class="section">
        <h2 class="section-title">二、寵物相關資訊</h2>
        <div class="info-grid two-columns">
          <div class="info-card">
            <span class="label">寵物品種</span>
            <input class="input persist-field" data-field="petBreed" type="text" placeholder="例：貓、狗、兔子等" />
          </div>
          <div class="info-card">
            <span class="label">寵物名稱</span>
            <input class="input persist-field" data-field="petName" type="text" placeholder="請輸入寵物名稱" />
          </div>
          <div class="info-card">
            <span class="label">晶片號碼</span>
            <input class="input persist-field" data-field="catChip" type="text" placeholder="例：123456789, 987654321（多個用逗號分隔）" />
          </div>
          <div class="info-card">
            <span class="label">認養日期</span>
            <input class="input persist-field" data-field="adoptionDate" type="text" placeholder="例：2025年3月18日, 2025年3月25日（多個用逗號分隔）" />
          </div>
        </div>
        <div class="info-card" style="margin-top:8px;">
          <span class="label">認養日期</span>
          <input class="input persist-field" data-field="adoptionDate" type="text" placeholder="例：2025年3月18日" />
        </div>
        <div class="info-card" style="margin-top:8px;">
          <span class="label">送養原因</span>
          <textarea class="input persist-field" data-field="reason" style="min-height:60px; resize:none;" placeholder="請說明為何送養"></textarea>
        </div>
      </section>

      <!-- 第三章：補充說明 -->
      <section class="section">
        <h2 class="section-title">三、補充說明與注意事項</h2>
        <div class="info-card">
          <span class="label">補充事項</span>
          <textarea class="input persist-field" data-field="notes" style="min-height:70px; resize:none;" placeholder="請輸入補充事項，如健康狀況、特殊習性等"></textarea>
        </div>
        <div class="info-card" style="margin-top:8px;">
          <span class="label">認養承諾與條款</span>
          <textarea class="input persist-field" data-field="promise" style="min-height:80px; resize:none;" placeholder="請說明認養人需遵守的承諾與條款"></textarea>
        </div>
        <div class="info-card" style="margin-top:8px;">
          <span class="label">備註</span>
          <textarea class="input persist-field" data-field="remarks" style="min-height:50px; resize:none;" placeholder="其他備註"></textarea>
        </div>
      </section>

      <!-- 第四章：電子簽名 -->
      <section class="section">
        <h2 class="section-title">四、電子簽名</h2>
        <div class="info-grid two-columns">
          <div class="signature-shell">
            <div class="signature-title">送養人簽名</div>
            <canvas id="giverSign"></canvas>
            <div class="signature-hint">請於此以手指或滑鼠完成送養人電子簽名</div>
            <button class="button" style="margin-top:6px; padding:6px;" onclick="clearSign('giver')">清除送養人簽名</button>
          </div>
          <div class="signature-shell">
            <div class="signature-title">認養人簽名</div>
            <canvas id="adopterSign"></canvas>
            <div class="signature-hint">請於此以手指或滑鼠完成認養人電子簽名</div>
            <button class="button" style="margin-top:6px; padding:6px;" onclick="clearSign('adopter')">清除認養人簽名</button>
          </div>
        </div>
      </section>

      <div class="footer-note">雙方對本合約內容均已知悉並同意，合約於雙方完成簽名後生效。</div>
    </div>
  </div>

  <script>
    const signatureCanvases = {
      giver: document.getElementById('giverSign'),
      adopter: document.getElementById('adopterSign')
    };
    const signatureContexts = {
      giver: signatureCanvases.giver.getContext('2d'),
      adopter: signatureCanvases.adopter.getContext('2d')
    };
    let activeSignatureType = null;
    let autoSaveTimer = null;

    function showAlert(message, type) {
      const alertBox = document.getElementById('alertBox');
      alertBox.textContent = message;
      alertBox.className = `alert ${type}`;
      setTimeout(() => {
        alertBox.className = 'alert';
      }, 3000);
    }

    function prepareCanvas(signatureType) {
      const canvas = signatureCanvases[signatureType];
      const context = signatureContexts[signatureType];
      const ratio = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      const previousImage = canvas.toDataURL('image/png');
      const image = new Image();

      canvas.width = rect.width * ratio;
      canvas.height = rect.height * ratio;
      context.setTransform(1, 0, 0, 1, 0, 0);
      context.scale(ratio, ratio);
      context.lineWidth = 2.2;
      context.lineCap = 'round';
      context.lineJoin = 'round';
      context.strokeStyle = '#5a4330';

      image.onload = () => {
        if (previousImage && previousImage !== 'data:,') {
          context.drawImage(image, 0, 0, rect.width, rect.height);
        }
      };
      image.src = previousImage;
    }

    function getPosition(signatureType, event) {
      const rect = signatureCanvases[signatureType].getBoundingClientRect();
      const clientX = event.touches ? event.touches[0].clientX : event.clientX;
      const clientY = event.touches ? event.touches[0].clientY : event.clientY;
      return {
        x: clientX - rect.left,
        y: clientY - rect.top
      };
    }

    function startDrawing(signatureType, event) {
      event.preventDefault();
      activeSignatureType = signatureType;
      const position = getPosition(signatureType, event);
      signatureContexts[signatureType].beginPath();
      signatureContexts[signatureType].moveTo(position.x, position.y);
    }

    function draw(signatureType, event) {
      if (activeSignatureType !== signatureType) return;
      event.preventDefault();
      const position = getPosition(signatureType, event);
      signatureContexts[signatureType].lineTo(position.x, position.y);
      signatureContexts[signatureType].stroke();
    }

    function stopDrawing(signatureType) {
      if (activeSignatureType !== signatureType) return;
      signatureContexts[signatureType].closePath();
      activeSignatureType = null;
      triggerAutoSave();
    }

    function getSignatureDataUrl(signatureType) {
      const signatureDataUrl = signatureCanvases[signatureType].toDataURL('image/png');
      return signatureDataUrl === 'data:,' ? '' : signatureDataUrl;
    }

    function getFormData() {
      const persistFields = document.querySelectorAll('.persist-field');
      const formData = {};

      persistFields.forEach((element) => {
        formData[element.dataset.field] = element.value;
      });

      formData.giverSignatureDataUrl = getSignatureDataUrl('giver');
      formData.adopterSignatureDataUrl = getSignatureDataUrl('adopter');
      formData.timestamp = new Date().toISOString();
      return formData;
    }

    function triggerAutoSave() {
      clearTimeout(autoSaveTimer);
      autoSaveTimer = setTimeout(() => {
        saveToServer();
      }, 500);
    }

    function clearSign(signatureType, shouldSave = true) {
      const canvas = signatureCanvases[signatureType];
      const context = signatureContexts[signatureType];
      context.clearRect(0, 0, canvas.width, canvas.height);
      if (shouldSave) triggerAutoSave();
    }

    function clearAllSigns() {
      clearSign('giver', false);
      clearSign('adopter', false);
      triggerAutoSave();
      showAlert('✅ 所有簽名已清除', 'success');
    }

    function loadSignatureFromDataUrl(signatureType, signatureDataUrl) {
      if (!signatureDataUrl) {
        clearSign(signatureType, false);
        return;
      }
      const signatureImage = new Image();
      signatureImage.onload = () => {
        clearSign(signatureType, false);
        const canvasWidth = signatureCanvases[signatureType].getBoundingClientRect().width;
        const canvasHeight = signatureCanvases[signatureType].getBoundingClientRect().height;
        signatureContexts[signatureType].drawImage(signatureImage, 0, 0, canvasWidth, canvasHeight);
      };
      signatureImage.src = signatureDataUrl;
    }

    function applyFormData(savedFormData) {
      document.querySelectorAll('.persist-field').forEach((element) => {
        const fieldName = element.dataset.field;
        if (Object.prototype.hasOwnProperty.call(savedFormData, fieldName)) {
          element.value = savedFormData[fieldName] || '';
        }
      });
      
      loadSignatureFromDataUrl('giver', savedFormData.giverSignatureDataUrl || '');
      loadSignatureFromDataUrl('adopter', savedFormData.adopterSignatureDataUrl || '');
    }

    async function loadFromServer() {
      try {
        const response = await fetch('/api/current');
        const result = await response.json();
        if (result.success && Object.keys(result.data).length > 0) {
          applyFormData(result.data);
        }
      } catch (error) {
        console.error('載入合約失敗', error);
      }
    }

    function exportJsonFile() {
      const jsonBlob = new Blob([JSON.stringify(getFormData(), null, 2)], { type: 'application/json' });
      const jsonUrl = URL.createObjectURL(jsonBlob);
      const link = document.createElement('a');
      link.href = jsonUrl;
      link.download = `寵物認養合約_${new Date().toISOString().slice(0, 10)}.json`;
      link.click();
      URL.revokeObjectURL(jsonUrl);
      showAlert('✅ JSON 已匯出', 'success');
    }

    function triggerImportJson() {
      const jsonFileInput = document.getElementById('jsonFileInput');
      jsonFileInput.click();
    }

    function importJsonFile(event) {
      const selectedFile = event.target.files && event.target.files[0];
      if (!selectedFile) return;
      const fileReader = new FileReader();
      fileReader.onload = () => {
        try {
          const parsedData = JSON.parse(fileReader.result);
          applyFormData(parsedData);
          triggerAutoSave();
          showAlert('✅ JSON 已載入', 'success');
        } catch (error) {
          showAlert('❌ JSON 載入失敗，請確認檔案格式正確', 'error');
        }
      };
      fileReader.readAsText(selectedFile, 'utf-8');
      event.target.value = '';
    }

    function clearAllData() {
      const confirmMessage = `⚠️ 警告：確定要清空所有資料嗎？此操作無法恢復！\n\n請輸入 "確認清空" 來確認：`;
      
      const userInput = prompt(confirmMessage);
      
      if (userInput === '確認清空') {
        document.querySelectorAll('.persist-field').forEach((element) => {
          element.value = '';
        });
        clearAllSigns();
        clearAllDataOnServer();
      } else if (userInput !== null) {
        showAlert('❌ 確認碼錯誤，操作已取消', 'error');
      }
    }

    async function clearAllDataOnServer() {
      try {
        const response = await fetch('/api/records', {
          method: 'DELETE'
        });
        const result = await response.json();
        if (result.success) {
          showAlert('✅ 所有資料已清空', 'success');
        } else {
          showAlert('❌ 清空失敗：' + result.message, 'error');
        }
      } catch (err) {
        showAlert('❌ 錯誤：' + err.message, 'error');
      }
    }

    function downloadContractImage() {
      showAlert('⏳ 正在生成圖片...', 'success');
      html2canvas(document.getElementById('contract'), {
        scale: 2,
        useCORS: true,
        backgroundColor: '#fffaf5'
      }).then((resultCanvas) => {
        const link = document.createElement('a');
        link.href = resultCanvas.toDataURL('image/png');
        link.download = `寵物認養合約_${new Date().toISOString().slice(0, 10)}.png`;
        link.click();
        showAlert('✅ 合約圖片已下載', 'success');
      }).catch((err) => {
        showAlert('❌ 生成圖片失敗：' + err.message, 'error');
      });
    }

    async function saveToServer() {
      try {
        const formData = getFormData();
        const response = await fetch('/api/current', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData),
        });

        const result = await response.json();
        if (!result.success) {
          console.error('保存失敗', result.message);
        }
      } catch (err) {
        console.error('保存錯誤：', err.message);
      }
    }

    // 初始化簽名區域
    Object.keys(signatureCanvases).forEach((signatureType) => {
      const canvas = signatureCanvases[signatureType];
      canvas.addEventListener('mousedown', (event) => startDrawing(signatureType, event));
      canvas.addEventListener('mousemove', (event) => draw(signatureType, event));
      canvas.addEventListener('mouseup', () => stopDrawing(signatureType));
      canvas.addEventListener('mouseleave', () => stopDrawing(signatureType));
      canvas.addEventListener('touchstart', (event) => startDrawing(signatureType, event), { passive: false });
      canvas.addEventListener('touchmove', (event) => draw(signatureType, event), { passive: false });
      canvas.addEventListener('touchend', () => stopDrawing(signatureType));
      canvas.addEventListener('touchcancel', () => stopDrawing(signatureType));
    });

    // 保存表單資料到伺服器
    document.querySelectorAll('.persist-field').forEach((element) => {
      element.addEventListener('input', triggerAutoSave);
      element.addEventListener('change', triggerAutoSave);
    });

    // JSON 載入
    const jsonFileInput = document.getElementById('jsonFileInput');
    jsonFileInput.addEventListener('change', importJsonFile);

    // 初始化
    Object.keys(signatureCanvases).forEach((signatureType) => {
      prepareCanvas(signatureType);
    });
    loadFromServer();

    // 視窗大小改變時重新繪製簽名
    window.addEventListener('resize', () => {
      Object.keys(signatureCanvases).forEach((signatureType) => {
        prepareCanvas(signatureType);
      });
      loadFromServer();
    });
  </script>
</body>
</html>
